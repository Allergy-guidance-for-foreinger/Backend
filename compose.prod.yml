services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mealguide-api:prod
    container_name: mealguide-app
    depends_on:
      postgres:
          condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mealguide-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mealguide-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-prod-data:/data
    restart: unless-stopped
    healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
  postgres-prod-data:
  redis-prod-data:
