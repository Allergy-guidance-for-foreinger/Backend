spring.application.name=${APP_NAME:mealguide-api}

# ===== Server =====
server.port=${APP_PORT:8080}

# ===== JWT =====
mealguide.jwt.access-secret=${JWT_ACCESS_SECRET}
mealguide.jwt.refresh-secret=${JWT_REFRESH_SECRET}
mealguide.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
mealguide.jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

# ===== Google OAuth =====
mealguide.google.client-id=${GOOGLE_CLIENT_ID}

# ===== Auth Debug =====
mealguide.auth-debug.enabled=${AUTH_DEBUG_ENABLED:false}

# ===== Meal Crawl =====
mealguide.mealcrawl.scheduler-enabled=${MEAL_CRAWL_SCHEDULER_ENABLED:false}
mealguide.mealcrawl.scheduler-cron=${MEAL_CRAWL_SCHEDULER_CRON:0 0 4 * * *}
mealguide.mealcrawl.python-base-url=${MEAL_CRAWL_PYTHON_BASE_URL:http://localhost:8000}
mealguide.mealcrawl.crawl-path=${MEAL_CRAWL_CRAWL_PATH:/api/v1/crawl/meals}
mealguide.mealcrawl.analysis-path=${MEAL_CRAWL_ANALYSIS_PATH:/api/v1/menus/analyze}
mealguide.mealcrawl.translation-path=${MEAL_CRAWL_TRANSLATION_PATH:/api/v1/menus/translate}
mealguide.mealcrawl.translation-target-languages=${MEAL_CRAWL_TRANSLATION_TARGET_LANGUAGES:en}
