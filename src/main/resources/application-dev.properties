# ===== postgreSQL =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mealguide}
spring.datasource.username=${DB_USERNAME:mealguide}
spring.datasource.password=${DB_PASSWORD:mealguide}

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ===== JPA =====
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# ===== CORS =====
mealguide.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===== Swagger server info =====
swagger.server-url=${SWAGGER_SERVER_URL:http://localhost:8080}
swagger.description=${SWAGGER_DESCRIPTION:Dev API Server}
swagger.enabled=true

# ===== Actuator =====
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:health,info}